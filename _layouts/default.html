<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<link href="/favicon.png" rel="icon" type="image/png" />
		<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
		<meta name="description" content="{{ site.description }}" />
		<script>
			let theme = localStorage.getItem("theme") || "system";
			document.documentElement.dataset.theme = theme;
		</script>
		<link href="https://fonts.googleapis.com" rel="preconnect" />
		<link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" type="text/css" />
		<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet" type="text/css" />
		<link href="/assets/css/styles.css" rel="stylesheet" type="text/css" />
		<script src="/assets/js/main.js" defer></script>
	</head>
	<body>
		{% include header.html %}
		<main>
			<article>
				{% if page.title %}
					<h1 id="{{ page.title | slugify }}">{{ page.title }}</h1>
				{% endif %}
				{{ content }}
			</article>
		</main>
		{% include footer.html %}
	</body>
</html>
